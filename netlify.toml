[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/practice.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/question-bank.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/answer-bank.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/audio-manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/assets/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
