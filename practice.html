<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考研复试口语练习</title>
  <style>
    :root {
      --bg: #edf3f4;
      --card: #fbfdfd;
      --panel: #f2f6f7;
      --text: #23323a;
      --muted: #6f8088;
      --accent: #2f7a86;
      --accent-soft: #d9edf0;
      --pink: #d85d4a;
      --next-start: #2d8c9d;
      --next-end: #2f6f89;
      --shadow: 0 24px 46px rgba(40, 78, 90, 0.18);
      --radius-card: 34px;
      --radius-pill: 999px;
      --btn-height: 76px;
      --font-ui: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      --font-display: "Avenir Next", "SF Pro Display", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      --font-cn-elegant: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: clamp(12px, 2.2vw, 34px) clamp(10px, 2vw, 20px) clamp(14px, 2.2vw, 24px);
      font-family: var(--font-ui);
      font-size: 90%;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      background:
        radial-gradient(circle at 7% 14%, rgba(98, 169, 183, 0.18), transparent 34%),
        radial-gradient(circle at 90% 82%, rgba(82, 122, 150, 0.15), transparent 31%),
        linear-gradient(180deg, #f2f7f7 0%, #edf3f4 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: min(900px, calc(100% - 8px));
      margin-top: clamp(8px, 3.2vh, 34px);
      animation: enter-page 420ms ease-out;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.8),
        0 18px 40px rgba(66, 79, 130, 0.12);
      padding: clamp(20px, 2.8vw, 36px) clamp(16px, 3.2vw, 42px) clamp(20px, 2.8vw, 30px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: clamp(1.05rem, 0.8vw + 0.9rem, 1.45rem);
      color: var(--muted);
      font-weight: 500;
      line-height: 1;
      gap: 10px;
    }

    .top .title {
      font-family: var(--font-ui);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .top .remaining {
      white-space: nowrap;
      font-family: var(--font-ui);
      font-size: clamp(0.96rem, 0.6vw + 0.86rem, 1.22rem);
      font-weight: 600;
      color: #4f6f77;
      background: #e3eff1;
      border: 1px solid #c9dfe2;
      border-radius: 999px;
      padding: 8px 14px;
    }

    .stage {
      min-height: clamp(250px, 46vh, 430px);
      padding: clamp(16px, 2.8vw, 34px) clamp(4px, 1vw, 12px) clamp(14px, 2vw, 24px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2.2vw, 24px);
    }

    .stage.compact {
      min-height: clamp(220px, 34vh, 300px);
    }

    .question-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      color: var(--accent);
      min-height: clamp(32px, 4.8vw, 50px);
      min-width: clamp(130px, 28vw, 210px);
      padding: 4px clamp(14px, 2.2vw, 22px);
      font-family: var(--font-display);
      font-size: clamp(0.94rem, 0.76vw + 0.86rem, 1.34rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 20px rgba(44, 116, 128, 0.18);
    }

    .waiting {
      font-family: var(--font-display);
      color: var(--accent);
      font-size: clamp(1.12rem, 1.55vw, 1.82rem);
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .waiting-pill {
      min-width: clamp(170px, 34vw, 280px);
      min-height: clamp(38px, 5.8vw, 62px);
      padding: 6px clamp(16px, 2.6vw, 28px);
      background: #d6ecef;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .waiting-sub {
      color: #2f7a86;
      font-family: var(--font-cn-elegant);
      font-size: clamp(1.26rem, 2.2vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .start-btn {
      grid-column: 1 / -1;
      width: 100%;
    }

    .question-box {
      margin-top: 2px;
      width: min(840px, 100%);
      animation: lift 280ms ease-out;
    }

    .question-en {
      margin: 6px 0 10px;
      font-family: var(--font-display);
      font-size: clamp(1.34rem, 2.15vw, 2.16rem);
      line-height: 1.26;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #2f3238;
    }

    .question-cn {
      margin: 0;
      font-family: var(--font-cn-elegant);
      font-size: clamp(1.48rem, 2.35vw, 2.35rem);
      line-height: 1.3;
      font-weight: 800;
      color: #2f3238;
      letter-spacing: 0.01em;
    }

    .answers {
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2.2vw, 22px);
      margin-top: 14px;
      animation: fade-up 320ms ease-out;
    }

    .speed {
      background: #e4ecee;
      border-radius: 24px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .speed span {
      font-size: clamp(0.92rem, 0.7vw + 0.76rem, 1.24rem);
      font-weight: 700;
      color: #5f6d73;
    }

    .speed-btn {
      border: 0;
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      min-width: 128px;
      font-size: clamp(0.88rem, 0.5vw + 0.74rem, 1.08rem);
      font-weight: 700;
      color: #58656c;
      background: #f1f4f5;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .speed-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .answer-card {
      position: relative;
      background: var(--panel);
      border-radius: 20px;
      padding: 22px 20px 18px;
      text-align: left;
      border-left: 8px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
    }

    .answer-card.simple {
      border-left-color: #2f7a86;
      animation: fade-up 330ms ease-out;
    }

    .answer-card.advanced {
      border-left-color: #d85d4a;
      animation: fade-up 380ms ease-out;
    }

    .answer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .answer-title {
      font-size: clamp(1rem, 0.9vw + 0.82rem, 1.35rem);
      font-weight: 800;
      color: #4a4f57;
    }

    .speak-btn {
      border: 0;
      border-radius: var(--radius-pill);
      background: #d9edf0;
      color: #2d6f79;
      font-size: clamp(0.82rem, 0.5vw + 0.72rem, 1.05rem);
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .answer-card.advanced .speak-btn {
      background: #ffdcd5;
      color: #b44c3f;
    }

    .answer-text {
      margin: 10px 0;
      font-family: var(--font-ui);
      font-size: clamp(0.96rem, 0.76vw + 0.9rem, 1.26rem);
      line-height: 1.45;
      font-weight: 700;
      color: #2f3338;
    }

    .answer-cn {
      margin: 8px 0 0;
      font-family: var(--font-cn-elegant);
      font-size: clamp(0.9rem, 0.66vw + 0.84rem, 1.16rem);
      line-height: 1.45;
      color: #2e3237;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      height: clamp(46px, 5.6vw, 66px);
      border-radius: var(--radius-pill);
      border: 0;
      cursor: pointer;
      font-size: clamp(0.9rem, 0.55vw + 0.84rem, 1.08rem);
      font-weight: 800;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
      font-family: var(--font-ui);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .btn-replay {
      background: #f4f7f8;
      border: 3px solid #c9d3d7;
      color: #5d6c74;
    }

    .btn-pause {
      background: #eaf1f3;
      border: 3px solid #c5d6db;
      color: #4f6a72;
    }

    .btn-view {
      background: linear-gradient(120deg, #24353f, #16242c);
      color: #fff;
    }

    .btn-answer {
      background: linear-gradient(120deg, #e26d58, #c15041);
      color: #fff;
    }

    .topic-actions {
      margin-top: clamp(18px, 2.4vw, 26px);
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .topic-btn {
      height: clamp(50px, 6.4vw, 72px);
      border: 0;
      border-radius: var(--radius-pill);
      color: #fff;
      font-size: clamp(0.94rem, 0.52vw + 0.88rem, 1.12rem);
      font-weight: 800;
      font-family: var(--font-display);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
    }

    .topic-btn:hover {
      transform: translateY(-1px);
      filter: saturate(1.08);
    }

    .topic-btn:disabled {
      cursor: not-allowed;
      opacity: 0.56;
      transform: none;
      filter: none;
    }

    .topic-btn-topic {
      background: linear-gradient(95deg, var(--next-start), var(--next-end));
    }

    .topic-btn-question {
      background: linear-gradient(95deg, #2c3b45, #24323c);
    }

    .footer {
      margin: 26px 0 0;
      text-align: center;
      color: #84979f;
      font-size: clamp(0.86rem, 0.62vw + 0.74rem, 1.12rem);
      font-weight: 700;
      line-height: 1.4;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 2px solid rgba(132, 151, 159, 0.5);
    }

    .part-switcher {
      position: fixed;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 28;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(244, 248, 249, 0.95);
      border: 1px solid #cfdee2;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.13);
      backdrop-filter: blur(5px);
    }

    .topic-status-bar {
      position: fixed;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: min(248px, 26vw);
      z-index: 26;
      padding: 14px 14px 12px;
      border-radius: 16px;
      background: rgba(244, 248, 249, 0.96);
      border: 1px solid #cfdee2;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.13);
      backdrop-filter: blur(5px);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .topic-status-bar.dragging {
      cursor: grabbing;
      box-shadow: 0 16px 34px rgba(31, 34, 56, 0.2);
    }

    .topic-status-bar.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-120%, -50%);
    }

    .topic-nav-toggle {
      position: fixed;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 27;
      border: 0;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(120deg, #29424d, #1b3038);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      padding: 0;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.22);
      transition: transform 0.2s ease, filter 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }

    .topic-nav-toggle:hover {
      transform: translateY(calc(-50% - 1px));
      filter: saturate(1.08);
    }

    .topic-nav-toggle.dragging {
      cursor: grabbing;
      box-shadow: 0 16px 34px rgba(31, 34, 56, 0.3);
    }

    .topic-nav-block {
      margin-top: 0;
      padding-top: 0;
    }

    .topic-nav-title {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 0.86rem;
      font-weight: 800;
      color: #4b6170;
    }

    .topic-nav-list {
      max-height: min(52vh, 430px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }

    .topic-nav-item {
      width: 100%;
      border: 1px solid #d2dde0;
      background: #fff;
      border-radius: 10px;
      padding: 7px 9px;
      text-align: left;
      color: #37515a;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .topic-nav-item:hover {
      transform: translateX(1px);
      border-color: #7eb0ba;
    }

    .topic-nav-item.active {
      border-color: #2f7a86;
      box-shadow: inset 0 0 0 1px rgba(47, 122, 134, 0.24);
      background: #edf7f8;
    }

    .topic-nav-name {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.3;
      color: #2d4851;
    }

    .topic-nav-meta {
      display: block;
      margin-top: 2px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #6f8590;
      line-height: 1.25;
    }

    .topic-status-label {
      color: #798196;
      font-weight: 700;
      font-family: var(--font-ui);
    }

    .topic-status-value {
      color: #37405a;
      font-weight: 800;
      word-break: break-word;
      font-family: var(--font-ui);
    }

    .part-btn {
      border: 1px solid #c9d7db;
      background: #ffffff;
      color: #53666d;
      border-radius: 999px;
      min-width: 80px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 800;
      font-family: var(--font-display);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .part-btn:hover {
      transform: translateX(1px);
      border-color: #7eb0ba;
      color: #2f7a86;
    }

    .part-btn.active {
      border-color: #2f7a86;
      background: linear-gradient(135deg, #2d8c9d, #2f6f89);
      color: #fff;
      box-shadow: 0 8px 20px rgba(47, 122, 134, 0.28);
    }

    .history-toggle {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 999px;
      background: #20323b;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.25);
      z-index: 30;
    }

    .history-toggle.dragging {
      cursor: grabbing;
      box-shadow: 0 16px 34px rgba(31, 34, 56, 0.32);
    }

    .history-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(390px, 90vw);
      height: 100vh;
      background: #f1f6f7;
      border-left: 1px solid #cfdee2;
      box-shadow: -12px 0 28px rgba(20, 24, 43, 0.16);
      transform: translateX(106%);
      transition: transform 0.25s ease;
      z-index: 35;
      display: flex;
      flex-direction: column;
    }

    .history-drawer.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 18px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #dbe6e9;
    }

    .history-header h2 {
      margin: 0;
      font-size: 22px;
      color: #2e4751;
      font-family: var(--font-display);
    }

    .history-close {
      border: 0;
      background: #dce9ed;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #3f5b63;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
    }

    .history-tip {
      margin: 10px 18px 0;
      font-size: 13px;
      color: #6f8590;
    }

    .history-list {
      margin: 10px 0 0;
      padding: 0 14px 16px;
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid #d2dde0;
      background: #fff;
      border-radius: 14px;
      margin-bottom: 10px;
      padding: 10px 12px;
      color: #30434b;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease;
    }

    .history-item:hover {
      transform: translateX(-2px);
      border-color: #7eb0ba;
    }

    .history-item.active {
      border-color: #2f7a86;
      box-shadow: inset 0 0 0 1px rgba(47, 122, 134, 0.25);
      background: #edf7f8;
    }

    .history-qid {
      display: block;
      font-size: 12px;
      color: #2f7a86;
      font-family: var(--font-display);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .history-topic {
      display: block;
      font-size: 13px;
      line-height: 1.4;
      color: #314750;
    }

    .history-empty {
      border: 1px dashed #c9d7db;
      border-radius: 12px;
      color: #738993;
      padding: 14px;
      text-align: center;
      font-size: 13px;
      background: #fff;
    }

    .history-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 24, 43, 0.25);
      z-index: 32;
    }

    .hidden {
      display: none;
    }

    .fatal-error-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(180deg, #f2f7f7 0%, #edf3f4 100%);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .fatal-error-overlay.visible {
      display: flex;
    }

    .fatal-error-card {
      width: min(760px, 100%);
      background: #fbfdfd;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(66, 79, 130, 0.16);
      border: 1px solid #d5e4e8;
      padding: 20px 18px;
      color: #2b3a41;
    }

    .fatal-error-card h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      color: #2f6f89;
    }

    .fatal-error-card p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.55;
      color: #4f636b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes enter-page {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lift {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      body {
        padding: 14px 10px 18px;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      .app {
        width: 100%;
        padding-bottom: 96px;
      }

      .card {
        padding: 16px 12px 14px;
        border-radius: 22px;
      }

      .top {
        font-size: 0.98rem;
      }

      .top .remaining {
        font-size: 0.9rem;
      }

      .stage {
        min-height: 220px;
        padding: 16px 2px 14px;
        gap: 14px;
      }

      .stage.compact {
        min-height: 180px;
      }

      .question-pill {
        min-height: 36px;
        min-width: 132px;
        font-size: 0.95rem;
        padding: 4px 14px;
      }

      .waiting {
        font-size: 1.22rem;
      }

      .waiting-pill {
        min-width: 148px;
        min-height: 36px;
        padding: 4px 14px;
      }

      .waiting-sub {
        font-size: 1.5rem;
      }

    function getPartTopics(partKey = activePart) {
      const map = new Map();
      getPartQuestions(partKey).forEach((item) => {
        const topicId = item.topic_id;
        if (!map.has(topicId)) {
          map.set(topicId, {
            topic_id: topicId,
            topic_title_en: item.topic_title_en,
            topic_title_cn: item.topic_title_cn,
            topic_order: item.topic_order,
            questions: []
          });
        }
        map.get(topicId).questions.push(item);
      });

      return [...map.values()]
        .sort((a, b) => a.topic_order - b.topic_order)
        .map((topic) => ({
          ...topic,
          questions: [...topic.questions].sort((a, b) => a.order - b.order)
        }));
    }

    function sanitizePartState(partKey) {
      const validQuestions = getPartQuestions(partKey);

      const validTopicIds = new Set(validQuestions.map((item) => item.topic_id));
      const state = partStates[partKey];

      state.drawnTopicIds = state.drawnTopicIds.filter((id) => validTopicIds.has(id));

      const sanitizedDrawnByTopic = {};
      Object.entries(state.drawnQuestionIdsByTopic || {}).forEach(([topicId, ids]) => {
        if (!validTopicIds.has(topicId)) {
          return;
        }
        sanitizedDrawnByTopic[topicId] = ids.filter((id) => validQuestionIds.has(id));
      });
      state.drawnQuestionIdsByTopic = sanitizedDrawnByTopic;

      state.practiceHistoryQuestionIds = state.practiceHistoryQuestionIds.filter((id) => validQuestionIds.has(id));

      if (!validTopicIds.has(state.currentTopicId)) {
        state.currentTopicId = null;
      }

      if (!validQuestionIds.has(state.currentQuestionId)) {
        state.currentQuestionId = null;
        state.isQuestionVisible = false;
        state.isAnswerVisible = false;
      }

    function initTopicNavDrag() {
      if (window.matchMedia("(max-width: 860px)").matches) {
        return;

      ensureTopicNavPosition();

      topicStatusBar.addEventListener("pointerdown", (event) => {
        if (event.target && event.target.closest(".topic-nav-list")) {
          return;
        }
        if (event.pointerType === "mouse" && event.button !== 0) {
          return;
        }
        ensureTopicNavPosition();
        const rect = topicStatusBar.getBoundingClientRect();
        topicNavDragState.pointerId = event.pointerId;
        topicNavDragState.startX = event.clientX;
        topicNavDragState.startY = event.clientY;
        topicNavDragState.originLeft = rect.left;
        topicNavDragState.originTop = rect.top;
        topicNavDragState.moved = false;
        try {
          topicStatusBar.setPointerCapture(event.pointerId);
        } catch (_capErr) {
          topicNavDragState.pointerId = null;
          topicStatusBar.classList.remove("dragging");
          return;
        }
        topicStatusBar.classList.add("dragging");
        resetTopicNavAutoHide();
        event.preventDefault();
      });

      topicStatusBar.addEventListener("pointermove", (event) => {
        if (topicNavDragState.pointerId !== event.pointerId) {
          return;
        }
        const deltaX = event.clientX - topicNavDragState.startX;
        const deltaY = event.clientY - topicNavDragState.startY;
        if (!topicNavDragState.moved && (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3)) {
          topicNavDragState.moved = true;
        }
        topicNavDragState.pendingX = topicNavDragState.originLeft + deltaX;
        topicNavDragState.pendingY = topicNavDragState.originTop + deltaY;
        if (topicNavDragState.rafId) {
          return;
        }
        topicNavDragState.rafId = requestAnimationFrame(() => {
          applyTopicNavPosition(topicNavDragState.pendingX, topicNavDragState.pendingY);
          topicNavDragState.rafId = null;
        });
      });

      topicStatusBar.addEventListener("pointerup", (event) => {
        endTopicNavDrag(event.pointerId);
      });
      topicStatusBar.addEventListener("pointercancel", (event) => {
        endTopicNavDrag(event.pointerId);
      });

      window.addEventListener("resize", () => {
        if (window.matchMedia("(max-width: 860px)").matches) {
          return;

        ensureTopicNavPosition();
        const rect = topicStatusBar.getBoundingClientRect();
        applyTopicNavPosition(rect.left, rect.top);
      });
    }

      return window.speechSynthesis.getVoices().filter((voice) => /^en(-|_)/i.test(voice.lang));
    }

    function getVoiceScore(voice) {
      let score = 0;
      const name = voice.name || "";
      const lang = voice.lang || "";
      if (/^en-US$/i.test(lang)) {
        score += 45;
      } else if (/^en(-|_)/i.test(lang)) {
        score += 30;
      }
      if (voice.localService) {
        score += 16;
      }
      if (/(Natural|Neural|Premium|Enhanced)/i.test(name)) {
        score += 90;
      }
      if (/(Samantha|Google US English|Karen|Moira|Daniel|Serena|Alex|Aria|Jenny|Guy|Emma|Brian|Andrew|Ana)/i.test(name)) {
        score += 48;
      }
      if (/(Compact|eSpeak|Festival|Robot|Synth)/i.test(name)) {
        score -= 80;
      }
      return score;
    }

    function pickPreferredEnglishVoice() {
      const englishVoices = getAllEnglishVoices();
      if (!englishVoices.length) {
        return null;
      }
      const sorted = [...englishVoices].sort((a, b) => getVoiceScore(b) - getVoiceScore(a));
      return sorted[0] || englishVoices[0];
    }

    function splitIntoSpeechChunks(text) {
      const normalized = text.replace(/\s+/g, " ").trim();
      if (!normalized) {
        return [];
      }
      if (normalized.length <= 170) {
        return [normalized];
      }
      const sentences = normalized.match(/[^.!?;:]+[.!?;:]?/g) || [normalized];
      const chunks = [];
      let bucket = "";
      sentences.forEach((sentence) => {
        const part = sentence.trim();
        if (!part) {
          return;
        }
        if (!bucket) {
          bucket = part;
          return;
        }
        const candidate = `${bucket} ${part}`;
        if (candidate.length > 170) {
          chunks.push(bucket);
          bucket = part;
        } else {
          bucket = candidate;
        }
      });
      if (bucket) {
        chunks.push(bucket);
      }
      return chunks;
    }

    function stopCurrentAudio() {
      if (!currentAudio) {
        return;
      }
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
      syncPauseButtonState();
    }

    function stopAnyPlayback() {
      stopCurrentAudio();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      stopSpeechMonitor();
      syncPauseButtonState();
    }

    function stopSpeechMonitor() {
      if (!speechMonitorTimer) {
        return;
      }
      window.clearInterval(speechMonitorTimer);
      speechMonitorTimer = null;
    }

    function startSpeechMonitor() {
      if (!("speechSynthesis" in window)) {
        return;
      }
      stopSpeechMonitor();
      speechMonitorTimer = window.setInterval(() => {
        const hasSpeech = window.speechSynthesis.speaking || window.speechSynthesis.paused;
        syncPauseButtonState();
        if (!hasSpeech) {
          stopSpeechMonitor();
        }
      }, 300);
    }

    function syncPauseButtonState() {
      const hasAudio = Boolean(currentAudio);
      const hasSpeech = "speechSynthesis" in window && (window.speechSynthesis.speaking || window.speechSynthesis.paused);
      const hasPlayback = hasAudio || hasSpeech;

      btnPause.disabled = !hasPlayback;
      if (!hasPlayback) {
        btnPause.textContent = "⏸️ 暂停播放";
        return;
      }

      const isPaused = hasAudio
        ? currentAudio.paused
        : ("speechSynthesis" in window && window.speechSynthesis.paused);

      btnPause.textContent = isPaused ? "▶️ 继续播放" : "⏸️ 暂停播放";
    }

    function getAudioPath(questionId, role) {
      const key = String(questionId);
      const item = audioManifest[key];
      if (!item) {
        return "";
      }
      return resolveAssetUrl(item[role] || "");
    }

    async function ensureAudioManifestLoaded() {
      if (isAudioManifestLoaded) {
        return !audioManifestLoadError;
      }
      if (!audioManifestLoadPromise) {
        audioManifestLoadPromise = loadAudioManifest();
      }
      await audioManifestLoadPromise;
      return !audioManifestLoadError;
    }

    async function playGeneratedAudio(questionId, role) {
      const audioPath = getAudioPath(questionId, role);
      if (!audioPath) {
        return false;
      }
      stopAnyPlayback();
      const audio = new Audio(audioPath);
      audio.preload = "auto";
      audio.playbackRate = currentRate;
      currentAudio = audio;
      audio.onplay = () => syncPauseButtonState();
      audio.onpause = () => syncPauseButtonState();
      try {
        await audio.play();
        audio.onended = () => {
          if (currentAudio === audio) {
            currentAudio = null;
          }
          syncPauseButtonState();
        };
        syncPauseButtonState();
        return true;
      } catch (error) {
        console.warn("Failed to play generated audio:", error);
        if (currentAudio === audio) {
          currentAudio = null;
        }
        syncPauseButtonState();
        return false;
      }
    }

    function playGeneratedAudioFromGesture(questionId, role) {
      const audioPath = getAudioPath(questionId, role);
      if (!audioPath) {
        return false;
      }
      stopAnyPlayback();
      const audio = new Audio(audioPath);
      audio.preload = "auto";
      audio.playbackRate = currentRate;
      currentAudio = audio;
      audio.onplay = () => syncPauseButtonState();
      audio.onpause = () => syncPauseButtonState();
      const playPromise = audio.play();
      if (playPromise && typeof playPromise.then === "function") {
        playPromise.then(() => {
          audio.onended = () => {
            if (currentAudio === audio) {
              currentAudio = null;
            }
            syncPauseButtonState();
          };
          syncPauseButtonState();
        }).catch((error) => {
          console.warn("Failed to play generated audio:", error);
          if (currentAudio === audio) {
            currentAudio = null;
          }
          syncPauseButtonState();
        });
      }
      return true;
    }

    function speakByRoleFromGesture(role, fallbackText, options = {}) {
      const { allowTtsFallback = true } = options;
      if (currentQuestion) {
        const localPath = getAudioPath(currentQuestion.id, role);
        if (localPath) {
          const started = playGeneratedAudioFromGesture(currentQuestion.id, role);
          if (started) {
            return;
          }
          return;
        }
      }
      if (allowTtsFallback) {
        speakText(fallbackText);
      }
    }

    async function speakByRole(role, fallbackText, options = {}) {
      const { allowTtsFallback = true } = options;
      if (currentQuestion) {
        await ensureAudioManifestLoaded();
        const localPath = getAudioPath(currentQuestion.id, role);
        if (localPath) {
          const played = await playGeneratedAudio(currentQuestion.id, role);
          if (played) {
            return;
          }
          return;
        }
      }
      if (allowTtsFallback) {
        speakText(fallbackText);
      }
    }

    function speakText(text) {
      const normalizedText = cleanDisplayText(text);
      if (!normalizedText) {
        return;
      }
      if (!("speechSynthesis" in window)) {
        console.warn("Speech synthesis is not supported in this browser");
        return;
      }
      const preferredVoice = pickPreferredEnglishVoice();
      const chunks = splitIntoSpeechChunks(normalizedText);
      if (!chunks.length) {
        return;
      }
      stopAnyPlayback();
      chunks.forEach((chunk, index) => {
        const utterance = new SpeechSynthesisUtterance(chunk);
        utterance.lang = preferredVoice ? preferredVoice.lang : "en-US";
        const baseRate = currentRate * 0.94;
        utterance.rate = Math.max(0.72, Math.min(1.1, baseRate + (index % 2 === 0 ? 0.006 : -0.004)));
        utterance.pitch = 0.97;
        utterance.volume = 1;
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }
        window.speechSynthesis.speak(utterance);
      });
      startSpeechMonitor();
      syncPauseButtonState();
    }

    function updateRemaining() {
      const topicsTotal = getPartTopics().length;
      const remaining = Math.max(topicsTotal - drawnTopicIds.length, 0);
      remainingEl.textContent = `剩余未抽：${remaining}个话题`;

    function updateActionButton() {
      btnAction.classList.remove("btn-view", "btn-answer");

      if (!currentQuestion) {
        btnAction.textContent = "👀 查看题目";
        btnAction.classList.add("btn-view");
        btnAction.disabled = true;
        return;
      }

      if (!isQuestionVisible) {
        btnAction.textContent = "👀 查看题目";
        btnAction.classList.add("btn-view");
        btnAction.disabled = false;
        return;
      }

      btnAction.textContent = "💡 用口语回答";
      btnAction.classList.add("btn-answer");
      btnAction.disabled = isAnswerVisible;

    function cleanDisplayText(value) {
      return String(value || "")
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderInlineMarkdown(value) {
      const escaped = escapeHtml(value).replace(/\r?\n/g, "<br>");
      return escaped
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function renderTopicNavigator() {
      const topics = getPartTopics();
      topicNavList.innerHTML = "";

      if (!topics.length) {
        const empty = document.createElement("div");
        empty.className = "history-empty";
        empty.textContent = "暂无话题";
        topicNavList.appendChild(empty);
        return;
      }

      topics.forEach((topic, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "topic-nav-item";
        btn.dataset.topicId = topic.topic_id;
        if (currentTopicId === topic.topic_id) {
          btn.classList.add("active");
        }

        const name = document.createElement("span");
        name.className = "topic-nav-name";
        name.textContent = `${index + 1}. ${topic.topic_title_cn || topic.topic_title_en}`;

        const meta = document.createElement("span");
        meta.className = "topic-nav-meta";
        meta.textContent = `${topic.topic_title_en} · ${topic.questions.length}题`;

        btn.appendChild(name);
        btn.appendChild(meta);
        topicNavList.appendChild(btn);
      });

    function switchToTopic(topicId) {
      const topic = getTopicById(topicId);
      if (!topic || !topic.questions.length) {
        return;
      }

      if (currentQuestion && currentQuestion.topic_id === topic.topic_id) {
        renderStage();
        return;
      }

      const lastInHistory = practiceHistoryQuestionIds
        .map((id) => findQuestionById(id))
        .find((question) => question && question.topic_id === topic.topic_id);

      const targetQuestion = lastInHistory || topic.questions[0];
      setCurrentQuestion(topic, targetQuestion, {
        autoSpeak: true,
        hideQuestion: true,
        allowTtsFallback: true
      });
    }

    function getAnswerBundle(question) {
      if (!question) {
        return {
          simple_en: "",
          simple_cn: "",
          advanced_en: "",
          advanced_cn: ""
        };
      }

      const fromBank = answerBank[question.id] || {};
      return {
        simple_en: String(fromBank.simple_en || question.simple_en || "A short answer could be based on your real personal experience."),
        simple_cn: String(fromBank.simple_cn || question.simple_cn || "中文思路：用2-3句结合你的真实情况回答即可。"),
        advanced_en: String(fromBank.advanced_en || question.advanced_en || "A stronger answer should include reasons, examples, and personal impact."),
        advanced_cn: String(fromBank.advanced_cn || question.advanced_cn || "中文思路：补充原因、细节和影响，让表达更完整。")
      };
    }

    function updateTopicButtonsState() {
      const topics = getPartTopics();
      const hasTopics = topics.length > 0;
      const hasCurrentTopic = Boolean(currentTopicId && getTopicById(currentTopicId));

      if (!isQuestionBankLoaded) {
        btnDrawTopic.disabled = true;
        btnDrawQuestion.disabled = true;
        btnDrawTopic.textContent = "⏳ 正在加载题库";
        btnDrawQuestion.textContent = "🧩 请稍候";
        return;
      }

      if (questionBankLoadError) {
        btnDrawTopic.disabled = true;
        btnDrawQuestion.disabled = true;
        btnDrawTopic.textContent = "⚠️ 题库加载失败";
        btnDrawQuestion.textContent = "🧩 请刷新重试";
        return;
      }

      btnDrawTopic.disabled = !hasTopics;
      btnDrawQuestion.disabled = !hasCurrentTopic;

      if (!hasTopics) {
        btnDrawTopic.textContent = "🎯 抽取新话题";
        btnDrawQuestion.textContent = "🧩 抽取该话题内的新问题";
        return;
      }

      if (hasCurrentTopic) {
        btnDrawTopic.textContent = "🎯 抽取新话题";
        btnDrawQuestion.textContent = "🧩 抽取该话题内的新问题";
      } else {
        btnDrawTopic.textContent = "🎯 抽取话题";
        btnDrawQuestion.textContent = "🧩 先抽取话题";

    function fillQuestionContent() {
      if (!currentQuestion) {
        questionEn.textContent = "";
        questionCn.textContent = "";
        simpleEn.textContent = "";
        simpleCn.textContent = "";
        advancedEn.textContent = "";
        advancedCn.textContent = "";
        return;
      }

      const topic = getTopicById(currentTopicId);
      const answer = getAnswerBundle(currentQuestion);
      questionPill.textContent = `${getPartLabel(activePart)} · ${topic ? topic.topic_title_en : "Topic"}`;
      questionEn.innerHTML = `Q${currentQuestion.order}. ${renderInlineMarkdown(currentQuestion.question_en)}`;
      questionCn.innerHTML = `💡 ${renderInlineMarkdown(currentQuestion.question_cn)}`;
      simpleEn.innerHTML = `A1: ${renderInlineMarkdown(answer.simple_en)}`;
      simpleCn.innerHTML = `中文翻译：${renderInlineMarkdown(answer.simple_cn)}`;
      advancedEn.innerHTML = `A2: ${renderInlineMarkdown(answer.advanced_en)}`;
      advancedCn.innerHTML = `中文翻译：${renderInlineMarkdown(answer.advanced_cn)}`;
    }

    function renderHistoryList() {
      historyList.innerHTML = "";
      const questions = getPartQuestions();

      if (!practiceHistoryQuestionIds.length) {
        const emptyNode = document.createElement("li");
        emptyNode.className = "history-empty";
        emptyNode.textContent = `${getPartLabel(activePart)} 暂无练习记录，先抽取话题开始吧。`;
        historyList.appendChild(emptyNode);
        return;
      }

        }

        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-item";
        button.dataset.qid = String(item.id);

        if (currentQuestion && currentQuestion.id === item.id) {
          button.classList.add("active");
        }

        const qid = document.createElement("span");
        qid.className = "history-qid";
        qid.textContent = `${item.topic_title_en} · Q${item.order}`;

        const topic = document.createElement("span");
        topic.className = "history-topic";
        topic.textContent = item.question_en;

        button.appendChild(qid);
        button.appendChild(topic);

      });

    function renderStage() {
      const isCompactStage = !currentQuestion || (!isQuestionVisible && !isAnswerVisible);
      stageEl.classList.toggle("compact", isCompactStage);
      updateTopicButtonsState();
      renderTopicNavigator();

      if (!currentQuestion) {
        if (btnStart) {
          const isReady =
            isQuestionBankLoaded
            && !questionBankLoadError
            && isAudioManifestLoaded
            && !audioManifestLoadError
            && getPartTopics().length > 0;

          btnStart.disabled = !isReady;
          if (!isQuestionBankLoaded || !isAudioManifestLoaded) {
            btnStart.textContent = "⏳ 正在加载题库与音频";
          } else if (questionBankLoadError || audioManifestLoadError) {
            btnStart.textContent = "⚠️ 加载失败，请刷新";
          } else if (!getPartTopics().length) {
            btnStart.textContent = "📭 题库为空";
          } else {
            btnStart.textContent = "🎯 开始练习（抽取话题）";
          }

          btnStart.classList.remove("hidden");
        }

        btnDrawTopic.classList.add("hidden");
        btnDrawQuestion.classList.add("hidden");
        waitingBox.classList.remove("hidden");
        questionPill.classList.add("hidden");
        questionBox.classList.add("hidden");
        answersPanel.classList.add("hidden");
        btnReplay.disabled = true;
        updateActionButton();
        updateRemaining();
        renderHistoryList();
        return;
      }

      fillQuestionContent();
      btnReplay.disabled = false;
      waitingBox.classList.add("hidden");
      questionPill.classList.remove("hidden");

      if (btnStart) {
        btnStart.classList.add("hidden");
      }
      btnDrawTopic.classList.remove("hidden");
      btnDrawQuestion.classList.remove("hidden");

      if (isQuestionVisible) {
        questionBox.classList.remove("hidden");
      } else {
        questionBox.classList.add("hidden");
      }

      if (isQuestionVisible && isAnswerVisible) {
        answersPanel.classList.remove("hidden");
      } else {
        answersPanel.classList.add("hidden");
      }
      updateActionButton();
      updateRemaining();
      renderHistoryList();
    }

    function closeDrawer() {
      historyDrawer.classList.remove("open");
      historyDrawer.setAttribute("aria-hidden", "true");
      historyBackdrop.classList.add("hidden");
    }

    function openDrawer() {
      historyDrawer.classList.add("open");
      historyDrawer.setAttribute("aria-hidden", "false");
      historyBackdrop.classList.remove("hidden");
    }

    function markQuestionDrawn(topicId, questionId) {
      if (!drawnQuestionIdsByTopic[topicId]) {
        drawnQuestionIdsByTopic[topicId] = [];
      }
      if (!drawnQuestionIdsByTopic[topicId].includes(questionId)) {
        drawnQuestionIdsByTopic[topicId].push(questionId);
      }
    }

    function addToHistory(question) {
      if (!question) {
        return;
      }
      practiceHistoryQuestionIds = [
        question.id,
        ...practiceHistoryQuestionIds.filter((id) => id !== question.id)
      ];
    }

    function findQuestionById(questionId) {
      if (!Number.isFinite(questionId)) {
        return null;
      }
      return getPartQuestions().find((question) => question.id === questionId) || null;
    }

    function setCurrentQuestion(topic, question, options = {}) {
      const { autoSpeak = true, hideQuestion = true, allowTtsFallback = true } = options;
      currentTopicId = topic.topic_id;
      currentQuestion = question;
      if (!drawnTopicIds.includes(topic.topic_id)) {
        drawnTopicIds.push(topic.topic_id);
      }
      markQuestionDrawn(topic.topic_id, question.id);
      addToHistory(question);
      isQuestionVisible = !hideQuestion;
      isAnswerVisible = false;
      renderStage();

      if (autoSpeak) {
        if (hasUserInteracted) {
          speakByRoleFromGesture("topic", question.question_en, { allowTtsFallback });
        } else {
          queuedAutoSpeak = {
            role: "topic",
            text: question.question_en,
            allowTtsFallback
          };
        }
      }

      saveActivePartState();
    }

    function drawTopicAndFirstQuestion(options = {}) {
      const { autoSpeak = true, allowTtsFallback = true } = options;
      const topics = getPartTopics();

      if (!topics.length) {
        console.warn("综合题库暂无话题，请先补充题库内容。");
        return;
      }

      let availableTopics = topics.filter((topic) => !drawnTopicIds.includes(topic.topic_id));
      if (!availableTopics.length) {
        console.info(`${getPartLabel(activePart)} 话题已全部抽取完，已自动重置话题池。`);
        drawnTopicIds = [];
        drawnQuestionIdsByTopic = {};
        availableTopics = topics;
      }

      const topic = availableTopics[Math.floor(Math.random() * availableTopics.length)];
      const firstQuestion = topic.questions[0];
      if (!firstQuestion) {
        return;
      }

      setCurrentQuestion(topic, firstQuestion, {
        autoSpeak,
        allowTtsFallback,
        hideQuestion: true
      });
    }

    function drawQuestionInCurrentTopic(options = {}) {
      const { autoSpeak = true } = options;
      const topics = getPartTopics();

      if (!topics.length) {
        console.warn("综合题库暂无话题，请先补充题库内容。");
        return;
      }

      if (!currentTopicId || !getTopicById(currentTopicId)) {
        console.warn("请先抽取一个话题，再抽取该话题内的新问题。");
        return;
      }

      const topic = getTopicById(currentTopicId);
      const drawnInTopic = drawnQuestionIdsByTopic[topic.topic_id] || [];
      const remainingQuestions = topic.questions.filter((question) => !drawnInTopic.includes(question.id));

      if (!remainingQuestions.length) {
        const topicName = topic.topic_title_cn
          ? `${topic.topic_title_en} / ${topic.topic_title_cn}`
          : topic.topic_title_en;
        window.alert(`【${topicName}】该话题内的题目已全部抽完，接下来将为你切换到一个新话题。`);
        console.info(`【${topic.topic_title_en}】该话题问题已抽取完，提示后自动抽取下一个话题。`);
        drawTopicAndFirstQuestion({ autoSpeak });
        return;
      }

      const question = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
      setCurrentQuestion(topic, question, {
        autoSpeak,
        hideQuestion: true
      });
    }

    function jumpToHistoryQuestion(questionId) {
      const target = findQuestionById(questionId);
      if (!target) {
        return;
      }
      const topic = getTopicById(target.topic_id);
      if (!topic) {
        return;
      }
      currentTopicId = topic.topic_id;
      currentQuestion = target;
      if (!drawnTopicIds.includes(topic.topic_id)) {
        drawnTopicIds.push(topic.topic_id);
      }
      markQuestionDrawn(topic.topic_id, target.id);
      addToHistory(target);
      isQuestionVisible = true;
      isAnswerVisible = false;
      renderStage();
      saveActivePartState();
      closeDrawer();
    }

    function clearAutoStartFlagInUrl() {
      syncPartInUrl(true);
    }

    async function loadQuestionBank() {
      isQuestionBankLoaded = false;
      questionBankLoadError = null;
      try {
        const data = await fetchJsonWithFallback("question-bank.json");
        if (!Array.isArray(data) || !data.length) {
          throw new Error("Invalid question bank format");
        }

        questionBank = data.map((item, index) => ({
          id: Number(item.id),
          part: INTEGRATED_BANK_KEY,
          topic_id: String(item.topic_id || `topic-${index + 1}`),
          topic_title_en: String(item.topic_title_en || "Topic"),
          topic_title_cn: String(item.topic_title_cn || ""),
          topic_order: Number(item.topic_order || 999),
          order: Number(item.order || 999),
          question_en: String(item.question_en || ""),
          question_cn: String(item.question_cn || "")
        })).filter((item) => Number.isFinite(item.id) && item.question_en);

        PARTS.forEach((partKey) => sanitizePartState(partKey));
        loadActivePartState();
      } catch (error) {
        questionBankLoadError = error;
        console.error("Failed to load question bank:", error);
        const isFileProtocol = window.location.protocol === "file:";
        const msg = isFileProtocol
          ? "当前你是直接打开 HTML 文件（file://），浏览器会拦截 JSON 读取。请在项目目录运行：python3 -m http.server 5500，然后访问：http://localhost:5500"
          : "题库 JSON 加载失败，请检查 question-bank.json 文件是否存在且为有效 JSON";
        if (typeof console !== "undefined" && console.warn) {
          console.warn(msg);
        }
      } finally {
        isQuestionBankLoaded = true;
      }

      renderStage();

      if (getPartTopics().length && shouldAutoStart && !currentQuestion) {
        drawTopicAndFirstQuestion({ autoSpeak: true, allowTtsFallback: false });
        clearAutoStartFlagInUrl();
      }

      saveActivePartState();
    }

    async function loadAnswerBank() {
      try {
        const data = await fetchJsonWithFallback("answer-bank.json");
        let list = [];

        if (Array.isArray(data)) {
          list = data;
        } else if (data && typeof data === "object" && Array.isArray(data.items)) {
          list = data.items;
        } else if (data && typeof data === "object") {
          list = Object.entries(data).map(([id, item]) => ({
            id: Number(id),
            ...(item || {})
          }));
        }

        answerBank = list.reduce((acc, item) => {
          const id = Number(item.id);
          if (!Number.isFinite(id)) {
            return acc;
          }
          acc[id] = {
            simple_en: String(item.simple_en || ""),
            simple_cn: String(item.simple_cn || ""),
            advanced_en: String(item.advanced_en || ""),
            advanced_cn: String(item.advanced_cn || "")
          };
          return acc;
        }, {});
      } catch (error) {
        console.info("No answer bank detected; fallback to built-in placeholders.", error);
        answerBank = {};
      }
    }

    async function loadAudioManifest() {
      isAudioManifestLoaded = false;
      audioManifestLoadError = null;
      try {
        const data = await fetchJsonWithFallback("audio-manifest.json");
        if (data && typeof data === "object" && data.items && typeof data.items === "object") {
          audioManifest = data.items;
          return;
        }
        if (data && typeof data === "object") {
          audioManifest = data;
          return;
        }
        audioManifest = {};
      } catch (error) {
        audioManifestLoadError = error;
        console.info("No generated audio manifest detected; fallback to browser TTS.", error);
        audioManifest = {};
      } finally {
        isAudioManifestLoaded = true;
      }
    }

    btnReplay.addEventListener("click", () => {
      if (!currentQuestion) {
        return;
      }
      speakByRoleFromGesture("topic", currentQuestion.question_en);
    });

    btnPause.addEventListener("click", async () => {
      if (currentAudio) {
        if (currentAudio.paused) {
          try {
            await currentAudio.play();
          } catch (error) {
            console.warn("Failed to resume audio:", error);
          }
        } else {
          currentAudio.pause();
        }
        syncPauseButtonState();
        return;
      }

      if (!("speechSynthesis" in window)) {
        return;
      }

      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      } else if (window.speechSynthesis.speaking) {
        window.speechSynthesis.pause();
      }
      startSpeechMonitor();
      syncPauseButtonState();
    });

    btnAction.addEventListener("click", () => {
      if (!currentQuestion) {
        return;
      }

      if (!isQuestionVisible) {
        isQuestionVisible = true;
        renderStage();
        saveActivePartState();
        return;
      }

      if (!isAnswerVisible) {
        isAnswerVisible = true;
        renderStage();
        saveActivePartState();
      }
    });

    btnDrawTopic.addEventListener("click", () => {
      drawTopicAndFirstQuestion({ autoSpeak: true });
    });

    if (btnStart) {
      btnStart.addEventListener("click", () => {
        hasUserInteracted = true;
        queuedAutoSpeak = null;
        drawTopicAndFirstQuestion({ autoSpeak: true });
      });
    }

    btnDrawQuestion.addEventListener("click", () => {
      drawQuestionInCurrentTopic({ autoSpeak: true });
    });

    speakSimple.addEventListener("click", () => {
      if (currentQuestion) {
        const answer = getAnswerBundle(currentQuestion);
        speakByRoleFromGesture("simple", answer.simple_en);
      }
    });

    speakAdvanced.addEventListener("click", () => {
      if (currentQuestion) {
        const answer = getAnswerBundle(currentQuestion);
        speakByRoleFromGesture("advanced", answer.advanced_en);
      }
    });

    speedButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentRate = Number(button.dataset.rate || "1");
        if (currentAudio) {
          currentAudio.playbackRate = currentRate;
        }
        speedButtons.forEach((btn) => {
          btn.classList.toggle("active", btn === button);
        });
      });
    });

    historyToggle.addEventListener("click", (event) => {
      if (dragState.justDragged) {
        event.preventDefault();
        return;
      }
      const isOpen = historyDrawer.classList.contains("open");
      if (isOpen) {
        closeDrawer();
      } else {
        openDrawer();
      }
    });

    historyClose.addEventListener("click", closeDrawer);
    historyBackdrop.addEventListener("click", closeDrawer);

    partButtons.forEach((button) => {
      button.addEventListener("click", () => {
        switchPart(normalizePart(button.dataset.part));
      });
    });

    historyList.addEventListener("click", (event) => {
      const target = event.target.closest("button[data-qid]");
      if (!target) {
        return;
      }
      const questionId = Number(target.dataset.qid);
      if (!Number.isFinite(questionId)) {
        return;
      }
      jumpToHistoryQuestion(questionId);
    });

    topicNavList.addEventListener("click", (event) => {
      if (topicNavDragState.justDragged) {
        event.preventDefault();
        return;
      }
      const target = event.target.closest("button[data-topic-id]");
      if (!target) {
        return;
      }
      const topicId = String(target.dataset.topicId || "");
      if (!topicId) {
        return;
      }
      resetTopicNavAutoHide();
      switchToTopic(topicId);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && historyDrawer.classList.contains("open")) {
        closeDrawer();
      }
    });

    renderPartButtons();
    syncPartInUrl(false);

    if ("speechSynthesis" in window) {
      try {
        window.speechSynthesis.getVoices();
      } catch (_voiceErr) {
        // 部分内置浏览器 WebView 对语音 API 实现不完整
      }
    }

    renderStage();
    initTopicNavVisibility();
    initTopicNavToggleDrag();
    initHistoryToggleDrag();
    initTopicNavDrag();

    try {
      const cachedManifest = sessionStorage.getItem(AUDIO_MANIFEST_CACHE_KEY);
      if (cachedManifest) {
        try {
          const data = JSON.parse(cachedManifest);
          if (data && typeof data === "object" && data.items && typeof data.items === "object") {
            audioManifest = data.items;
            isAudioManifestLoaded = true;
            audioManifestLoadPromise = Promise.resolve();
          } else if (data && typeof data === "object") {
            audioManifest = data;
            isAudioManifestLoaded = true;
            audioManifestLoadPromise = Promise.resolve();
          }
        } catch (parseErr) {
          console.warn("Failed to parse cached audio manifest:", parseErr);
        }
      }
    } catch (storageErr) {
      console.info("sessionStorage access issue, continuing:", storageErr);
    }

    const handleFirstInteraction = () => {
      hasUserInteracted = true;
      if (queuedAutoSpeak && queuedAutoSpeak.text) {
        const payload = queuedAutoSpeak;
        queuedAutoSpeak = null;
        speakByRoleFromGesture(payload.role, payload.text, { allowTtsFallback: payload.allowTtsFallback });
      }
    };
    try {
      document.addEventListener("pointerdown", handleFirstInteraction, { once: true, passive: true });
    } catch (_optsErr) {
      document.addEventListener("pointerdown", function onFirstPointer(ev) {
        handleFirstInteraction(ev);
        document.removeEventListener("pointerdown", onFirstPointer);
      });
    }
    try {
      document.addEventListener("keydown", handleFirstInteraction, { once: true });
    } catch (_keyOptsErr) {
      document.addEventListener("keydown", function onFirstKey(ev) {
        handleFirstInteraction(ev);
        document.removeEventListener("keydown", onFirstKey);
      });
    }

    questionBankLoadPromise = loadQuestionBank();
    if (!audioManifestLoadPromise) {
      audioManifestLoadPromise = isAudioManifestLoaded ? Promise.resolve() : loadAudioManifest();
    }
    Promise.all([audioManifestLoadPromise, loadAnswerBank(), questionBankLoadPromise]).catch(() => {
      // Errors are handled in individual load functions
    });
  </script>
</body>
</html>
