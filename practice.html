<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雅思口语练习</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=Sora:wght@600;700;800&display=swap");

    :root {
      --bg: #eceef1;
      --card: #f8f8fa;
      --panel: #eff1f4;
      --text: #2f3338;
      --muted: #8f949c;
      --accent: #4950d0;
      --accent-soft: #dbe0ff;
      --pink: #e22682;
      --next-start: #667eea;
      --next-end: #7c4fbc;
      --shadow: 0 16px 45px rgba(79, 85, 120, 0.16);
      --radius-card: 34px;
      --radius-pill: 999px;
      --btn-height: 76px;
      --font-ui: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
      --font-display: "Plus Jakarta Sans", "Sora", "Noto Sans SC", sans-serif;
      --font-cn-elegant: "Noto Serif SC", "Songti SC", "STSong", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: clamp(12px, 2.2vw, 34px) clamp(10px, 2vw, 20px) clamp(14px, 2.2vw, 24px);
      font-family: var(--font-ui);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 12%, rgba(145, 153, 255, 0.14), transparent 35%),
        radial-gradient(circle at 90% 78%, rgba(141, 105, 210, 0.13), transparent 30%),
        var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: min(900px, calc(100% - 8px));
      margin-top: clamp(8px, 3.2vh, 34px);
      animation: enter-page 420ms ease-out;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      padding: clamp(20px, 2.8vw, 36px) clamp(16px, 3.2vw, 42px) clamp(20px, 2.8vw, 30px);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: clamp(1.05rem, 0.8vw + 0.9rem, 1.45rem);
      color: var(--muted);
      font-weight: 500;
      line-height: 1;
      gap: 10px;
    }

    .top .title {
      font-family: var(--font-ui);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .top .remaining {
      white-space: nowrap;
      font-family: var(--font-ui);
      font-size: clamp(0.96rem, 0.6vw + 0.86rem, 1.22rem);
      font-weight: 500;
    }

    .stage {
      min-height: clamp(250px, 46vh, 430px);
      padding: clamp(16px, 2.8vw, 34px) clamp(4px, 1vw, 12px) clamp(14px, 2vw, 24px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 2.2vw, 24px);
    }

    .stage.compact {
      min-height: clamp(220px, 34vh, 300px);
    }

    .question-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-pill);
      background: var(--accent-soft);
      color: var(--accent);
      min-height: clamp(32px, 4.8vw, 50px);
      min-width: clamp(130px, 28vw, 210px);
      padding: 4px clamp(14px, 2.2vw, 22px);
      font-family: var(--font-display);
      font-size: clamp(0.94rem, 0.76vw + 0.86rem, 1.34rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .waiting {
      font-family: var(--font-display);
      color: var(--accent);
      font-size: clamp(1.12rem, 1.55vw, 1.82rem);
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .waiting-pill {
      min-width: clamp(170px, 34vw, 280px);
      min-height: clamp(38px, 5.8vw, 62px);
      padding: 6px clamp(16px, 2.6vw, 28px);
      background: #cfd5ff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .waiting-sub {
      color: #5e64eb;
      font-family: var(--font-cn-elegant);
      font-size: clamp(1.26rem, 2.2vw, 2.2rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .question-box {
      margin-top: 2px;
      width: min(840px, 100%);
      animation: lift 280ms ease-out;
    }

    .question-en {
      margin: 6px 0 10px;
      font-family: var(--font-display);
      font-size: clamp(1.34rem, 2.15vw, 2.16rem);
      line-height: 1.26;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #2f3238;
    }

    .question-cn {
      margin: 0;
      font-family: var(--font-cn-elegant);
      font-size: clamp(1.48rem, 2.35vw, 2.35rem);
      line-height: 1.3;
      font-weight: 800;
      color: #2f3238;
      letter-spacing: 0.01em;
    }

    .answers {
      width: min(860px, 100%);
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2.2vw, 22px);
      margin-top: 14px;
      animation: fade-up 320ms ease-out;
    }

    .speed {
      background: #e2e5ea;
      border-radius: 24px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .speed span {
      font-size: clamp(0.92rem, 0.7vw + 0.76rem, 1.24rem);
      font-weight: 700;
      color: #6a6f77;
    }

    .speed-btn {
      border: 0;
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      min-width: 128px;
      font-size: clamp(0.88rem, 0.5vw + 0.74rem, 1.08rem);
      font-weight: 700;
      color: #626872;
      background: #f1f2f5;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .speed-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .answer-card {
      position: relative;
      background: var(--panel);
      border-radius: 20px;
      padding: 22px 20px 18px;
      text-align: left;
      border-left: 8px solid transparent;
    }

    .answer-card.simple {
      border-left-color: #4e52ce;
      animation: fade-up 330ms ease-out;
    }

    .answer-card.advanced {
      border-left-color: #e03f98;
      animation: fade-up 380ms ease-out;
    }

    .answer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .answer-title {
      font-size: clamp(1rem, 0.9vw + 0.82rem, 1.35rem);
      font-weight: 800;
      color: #4a4f57;
    }

    .speak-btn {
      border: 0;
      border-radius: var(--radius-pill);
      background: #d7dcff;
      color: #3f45bf;
      font-size: clamp(0.82rem, 0.5vw + 0.72rem, 1.05rem);
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .answer-card.advanced .speak-btn {
      background: #ffd8ea;
      color: #ca236f;
    }

    .answer-text {
      margin: 10px 0;
      font-family: var(--font-ui);
      font-size: clamp(0.96rem, 0.76vw + 0.9rem, 1.26rem);
      line-height: 1.45;
      font-weight: 700;
      color: #2f3338;
    }

    .answer-cn {
      margin: 8px 0 0;
      font-family: var(--font-cn-elegant);
      font-size: clamp(0.9rem, 0.66vw + 0.84rem, 1.16rem);
      line-height: 1.45;
      color: #2e3237;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 30px;
    }

    .btn {
      height: clamp(52px, 6.4vw, var(--btn-height));
      border-radius: var(--radius-pill);
      border: 0;
      cursor: pointer;
      font-size: clamp(0.94rem, 0.7vw + 0.86rem, 1.18rem);
      font-weight: 800;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
      font-family: var(--font-ui);
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .btn-replay {
      background: #f5f5f6;
      border: 3px solid #d1d3d8;
      color: #6a6f77;
    }

    .btn-view {
      background: #090a10;
      color: #fff;
    }

    .btn-answer {
      background: var(--pink);
      color: #fff;
    }

    .topic-actions {
      margin-top: clamp(22px, 2.8vw, 32px);
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .topic-btn {
      height: clamp(56px, 7.2vw, 84px);
      border: 0;
      border-radius: var(--radius-pill);
      color: #fff;
      font-size: clamp(1rem, 0.72vw + 0.9rem, 1.26rem);
      font-weight: 800;
      font-family: var(--font-display);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
    }

    .topic-btn:hover {
      transform: translateY(-1px);
      filter: saturate(1.08);
    }

    .topic-btn:disabled {
      cursor: not-allowed;
      opacity: 0.56;
      transform: none;
      filter: none;
    }

    .topic-btn-topic {
      background: linear-gradient(95deg, var(--next-start), var(--next-end));
    }

    .topic-btn-question {
      background: linear-gradient(95deg, #232734, #2f364a);
    }

    .footer {
      margin: 26px 0 0;
      text-align: center;
      color: #a5a8ad;
      font-size: clamp(0.86rem, 0.62vw + 0.74rem, 1.12rem);
      font-weight: 700;
      line-height: 1.4;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 2px solid rgba(165, 168, 173, 0.55);
    }

    .part-switcher {
      position: fixed;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 28;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(245, 247, 251, 0.95);
      border: 1px solid #d8dce6;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.13);
      backdrop-filter: blur(5px);
    }

    .part-btn {
      border: 1px solid #cfd5e2;
      background: #ffffff;
      color: #59606d;
      border-radius: 999px;
      min-width: 80px;
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 800;
      font-family: var(--font-display);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .part-btn:hover {
      transform: translateX(1px);
      border-color: #868edf;
      color: #434cc6;
    }

    .part-btn.active {
      border-color: #545eda;
      background: linear-gradient(135deg, #5d67e2, #6b53c3);
      color: #fff;
      box-shadow: 0 8px 20px rgba(82, 90, 196, 0.28);
    }

    .history-toggle {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 999px;
      background: #11131a;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 16px;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      box-shadow: 0 12px 28px rgba(31, 34, 56, 0.25);
      z-index: 30;
    }

    .history-toggle.dragging {
      cursor: grabbing;
      box-shadow: 0 16px 34px rgba(31, 34, 56, 0.32);
    }

    .history-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(390px, 90vw);
      height: 100vh;
      background: #f4f6f9;
      border-left: 1px solid #d8dce6;
      box-shadow: -12px 0 28px rgba(20, 24, 43, 0.16);
      transform: translateX(106%);
      transition: transform 0.25s ease;
      z-index: 35;
      display: flex;
      flex-direction: column;
    }

    .history-drawer.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 18px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e6ef;
    }

    .history-header h2 {
      margin: 0;
      font-size: 22px;
      color: #31384a;
      font-family: var(--font-display);
    }

    .history-close {
      border: 0;
      background: #dfe4f2;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #4a4f60;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
    }

    .history-tip {
      margin: 10px 18px 0;
      font-size: 13px;
      color: #7f8695;
    }

    .history-list {
      margin: 10px 0 0;
      padding: 0 14px 16px;
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    .history-item {
      width: 100%;
      text-align: left;
      border: 1px solid #dce2ef;
      background: #fff;
      border-radius: 14px;
      margin-bottom: 10px;
      padding: 10px 12px;
      color: #333a48;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease;
    }

    .history-item:hover {
      transform: translateX(-2px);
      border-color: #9098df;
    }

    .history-item.active {
      border-color: #4f57d7;
      box-shadow: inset 0 0 0 1px rgba(79, 87, 215, 0.25);
      background: #f2f4ff;
    }

    .history-qid {
      display: block;
      font-size: 12px;
      color: #5963cc;
      font-family: var(--font-display);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .history-topic {
      display: block;
      font-size: 13px;
      line-height: 1.4;
      color: #343948;
    }

    .history-empty {
      border: 1px dashed #cfd5e4;
      border-radius: 12px;
      color: #818a9b;
      padding: 14px;
      text-align: center;
      font-size: 13px;
      background: #fff;
    }

    .history-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 24, 43, 0.25);
      z-index: 32;
    }

    .hidden {
      display: none;
    }

    @keyframes enter-page {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lift {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      body {
        padding: 14px 10px 18px;
      }

      .card {
        padding: 16px 12px 14px;
        border-radius: 22px;
      }

      .top {
        font-size: 0.98rem;
      }

      .top .remaining {
        font-size: 0.9rem;
      }

      .stage {
        min-height: 220px;
        padding: 16px 2px 14px;
        gap: 14px;
      }

      .stage.compact {
        min-height: 180px;
      }

      .question-pill {
        min-height: 36px;
        min-width: 132px;
        font-size: 0.95rem;
        padding: 4px 14px;
      }

      .waiting {
        font-size: 1.22rem;
      }

      .waiting-pill {
        min-width: 148px;
        min-height: 36px;
        padding: 4px 14px;
      }

      .waiting-sub {
        font-size: 1.5rem;
      }

      .question-en {
        font-size: 1.2rem;
        margin-bottom: 6px;
      }

      .question-cn {
        font-size: 1.26rem;
      }

      .speed {
        padding: 10px 8px;
      }

      .speed span {
        font-size: 0.88rem;
      }

      .speed-btn {
        min-width: 118px;
        font-size: 0.84rem;
        padding: 7px 12px;
      }

      .answer-card {
        padding: 14px 12px 12px;
        border-left-width: 5px;
      }

      .answer-title {
        font-size: 0.95rem;
      }

      .speak-btn {
        font-size: 0.8rem;
        padding: 7px 12px;
      }

      .answer-text {
        font-size: 1rem;
        margin: 6px 0;
      }

      .answer-cn {
        font-size: 0.92rem;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .btn,
      .topic-btn {
        height: 52px;
        font-size: 1rem;
      }

      .topic-actions {
        grid-template-columns: 1fr;
      }

      .footer {
        margin-top: 20px;
        font-size: 0.82rem;
      }

      .history-toggle {
        top: auto;
        bottom: 18px;
        right: 12px;
        transform: none;
        font-size: 13px;
        padding: 10px 12px;
      }

      .history-drawer {
        width: min(360px, 92vw);
      }

      .part-switcher {
        left: 10px;
        top: auto;
        bottom: 18px;
        transform: none;
        flex-direction: row;
        gap: 6px;
        padding: 8px;
      }

      .part-btn {
        min-width: 66px;
        padding: 6px 10px;
        font-size: 0.76rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <header class="top">
        <div class="title">雅思口语练习</div>
        <div class="remaining" id="remaining">剩余未抽：0个话题</div>
      </header>

      <div class="stage" id="stage">
        <div class="question-pill hidden" id="questionPill">Question 1</div>

        <div id="waitingBox">
          <div class="question-pill waiting waiting-pill">Waiting...</div>
          <div class="waiting-sub">✨ 准备好了请开始</div>
        </div>

        <div class="question-box hidden" id="questionBox">
          <p class="question-en" id="questionEn"></p>
          <p class="question-cn" id="questionCn"></p>
        </div>

        <section class="answers hidden" id="answersPanel">
          <div class="speed">
            <span>回答语速：</span>
            <button class="speed-btn" data-rate="0.8" type="button">0.8x 慢速</button>
            <button class="speed-btn active" data-rate="1" type="button">1.0x 常速</button>
          </div>

          <article class="answer-card simple">
            <div class="answer-head">
              <div class="answer-title">🟢 回答一（简单版）</div>
              <button class="speak-btn" id="speakSimple" type="button">🔊 朗读</button>
            </div>
            <p class="answer-text" id="simpleEn"></p>
            <p class="answer-cn" id="simpleCn"></p>
          </article>

          <article class="answer-card advanced">
            <div class="answer-head">
              <div class="answer-title">🔴 回答二（精华版）</div>
              <button class="speak-btn" id="speakAdvanced" type="button">🔊 朗读</button>
            </div>
            <p class="answer-text" id="advancedEn"></p>
            <p class="answer-cn" id="advancedCn"></p>
          </article>
        </section>
      </div>

      <div class="controls">
        <button class="btn btn-replay" id="btnReplay" type="button">🔁 再听一遍</button>
        <button class="btn btn-view" id="btnAction" type="button">👀 查看题目</button>
      </div>
    </section>

    <div class="topic-actions">
      <button class="topic-btn topic-btn-topic" id="btnDrawTopic" type="button">🎯 抽取新话题</button>
      <button class="topic-btn topic-btn-question" id="btnDrawQuestion" type="button">🧩 抽取该话题内的新问题</button>
    </div>

    <footer class="footer">
      © <a href="#" aria-label="cici雅思资料库">cici雅思资料库</a> | 雅思口语高分上岸
    </footer>
  </div>

  <button class="history-toggle" id="historyToggle" type="button">🗂 练习记录</button>

  <nav class="part-switcher" aria-label="选择口语Part">
    <button class="part-btn active" data-part="part1" type="button">Part 1</button>
    <button class="part-btn" data-part="part2" type="button">Part 2</button>
    <button class="part-btn" data-part="part3" type="button">Part 3</button>
  </nav>

  <aside class="history-drawer" id="historyDrawer" aria-hidden="true">
    <div class="history-header">
      <h2>练习记录</h2>
      <button class="history-close" id="historyClose" type="button" aria-label="关闭侧边栏">×</button>
    </div>
    <p class="history-tip">点击任意题目可快速跳转</p>
    <ul class="history-list" id="historyList"></ul>
  </aside>

  <div class="history-backdrop hidden" id="historyBackdrop"></div>

  <script>
    const QUESTION_BANK_PATH = "./question-bank.json";
    const ANSWER_BANK_PATH = "./answer-bank.json";
    const AUDIO_MANIFEST_PATH = "./audio-manifest.json";
    const urlParams = new URLSearchParams(window.location.search);
    const shouldAutoStart = urlParams.get("autostart") === "1";
    const PARTS = ["part1", "part2", "part3"];
    const PART_LABELS = {
      part1: "Part 1",
      part2: "Part 2",
      part3: "Part 3"
    };

    const stageEl = document.getElementById("stage");
    const remainingEl = document.getElementById("remaining");
    const waitingBox = document.getElementById("waitingBox");
    const questionPill = document.getElementById("questionPill");
    const questionBox = document.getElementById("questionBox");
    const questionEn = document.getElementById("questionEn");
    const questionCn = document.getElementById("questionCn");
    const answersPanel = document.getElementById("answersPanel");
    const simpleEn = document.getElementById("simpleEn");
    const simpleCn = document.getElementById("simpleCn");
    const advancedEn = document.getElementById("advancedEn");
    const advancedCn = document.getElementById("advancedCn");
    const btnReplay = document.getElementById("btnReplay");
    const btnAction = document.getElementById("btnAction");
    const btnDrawTopic = document.getElementById("btnDrawTopic");
    const btnDrawQuestion = document.getElementById("btnDrawQuestion");
    const speakSimple = document.getElementById("speakSimple");
    const speakAdvanced = document.getElementById("speakAdvanced");
    const historyToggle = document.getElementById("historyToggle");
    const historyDrawer = document.getElementById("historyDrawer");
    const historyClose = document.getElementById("historyClose");
    const historyBackdrop = document.getElementById("historyBackdrop");
    const historyList = document.getElementById("historyList");
    const historyTip = document.querySelector(".history-tip");
    const partButtons = Array.from(document.querySelectorAll(".part-btn"));

    const speedButtons = Array.from(document.querySelectorAll(".speed-btn"));

    let questionBank = [];
    let answerBank = {};
    let currentQuestion = null;
    let currentTopicId = null;
    let drawnTopicIds = [];
    let drawnQuestionIdsByTopic = {};
    let practiceHistoryQuestionIds = [];
    let isQuestionVisible = false;
    let isAnswerVisible = false;
    let currentRate = 1;
    let audioManifest = {};
    let currentAudio = null;
    let activePart = normalizePart(urlParams.get("part"));

    const HISTORY_TOGGLE_POS_KEY = "ielts-history-toggle-pos";
    const partStates = {
      part1: createPartState(),
      part2: createPartState(),
      part3: createPartState()
    };

    const dragState = {
      pointerId: null,
      startX: 0,
      startY: 0,
      originLeft: 0,
      originTop: 0,
      moved: false,
      justDragged: false,
      inited: false
    };

    function createPartState() {
      return {
        drawnTopicIds: [],
        drawnQuestionIdsByTopic: {},
        practiceHistoryQuestionIds: [],
        currentTopicId: null,
        currentQuestionId: null,
        isQuestionVisible: false,
        isAnswerVisible: false
      };
    }

    function normalizePart(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (raw === "part2" || raw === "part 2" || raw === "2") {
        return "part2";
      }
      if (raw === "part3" || raw === "part 3" || raw === "3") {
        return "part3";
      }
      return "part1";
    }

    function getPartLabel(partKey) {
      return PART_LABELS[partKey] || "Part 1";
    }

    function getPartQuestions(partKey = activePart) {
      return questionBank.filter((item) => item.part === partKey);
    }

    function getPartTopics(partKey = activePart) {
      const map = new Map();
      getPartQuestions(partKey).forEach((item) => {
        const topicId = item.topic_id;
        if (!map.has(topicId)) {
          map.set(topicId, {
            topic_id: topicId,
            topic_title_en: item.topic_title_en,
            topic_title_cn: item.topic_title_cn,
            topic_order: item.topic_order,
            questions: []
          });
        }
        map.get(topicId).questions.push(item);
      });

      return [...map.values()]
        .sort((a, b) => a.topic_order - b.topic_order)
        .map((topic) => ({
          ...topic,
          questions: [...topic.questions].sort((a, b) => a.order - b.order)
        }));
    }

    function getTopicById(topicId, partKey = activePart) {
      return getPartTopics(partKey).find((topic) => topic.topic_id === topicId) || null;
    }

    function syncHistoryTip() {
      historyTip.textContent = `当前 ${getPartLabel(activePart)} 练习记录，点击任意问题可快速跳转`;
    }

    function renderPartButtons() {
      partButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.part === activePart);
      });
      syncHistoryTip();
    }

    function saveActivePartState() {
      const state = partStates[activePart];
      state.drawnTopicIds = [...drawnTopicIds];
      state.drawnQuestionIdsByTopic = JSON.parse(JSON.stringify(drawnQuestionIdsByTopic));
      state.practiceHistoryQuestionIds = [...practiceHistoryQuestionIds];
      state.currentTopicId = currentTopicId;
      state.currentQuestionId = currentQuestion ? currentQuestion.id : null;
      state.isQuestionVisible = isQuestionVisible;
      state.isAnswerVisible = isAnswerVisible;
    }

    function loadActivePartState() {
      const state = partStates[activePart];
      drawnTopicIds = [...state.drawnTopicIds];
      drawnQuestionIdsByTopic = JSON.parse(JSON.stringify(state.drawnQuestionIdsByTopic || {}));
      practiceHistoryQuestionIds = [...state.practiceHistoryQuestionIds];
      currentTopicId = state.currentTopicId;
      isQuestionVisible = state.isQuestionVisible;
      isAnswerVisible = state.isAnswerVisible;

      currentQuestion = findQuestionById(state.currentQuestionId);
      if (!currentQuestion) {
        currentTopicId = null;
        isQuestionVisible = false;
        isAnswerVisible = false;
      }
    }

    function sanitizePartState(partKey) {
      const validQuestions = getPartQuestions(partKey);
      const validQuestionIds = new Set(validQuestions.map((item) => item.id));
      const validTopicIds = new Set(validQuestions.map((item) => item.topic_id));
      const state = partStates[partKey];

      state.drawnTopicIds = state.drawnTopicIds.filter((id) => validTopicIds.has(id));

      const sanitizedDrawnByTopic = {};
      Object.entries(state.drawnQuestionIdsByTopic || {}).forEach(([topicId, ids]) => {
        if (!validTopicIds.has(topicId)) {
          return;
        }
        sanitizedDrawnByTopic[topicId] = ids.filter((id) => validQuestionIds.has(id));
      });
      state.drawnQuestionIdsByTopic = sanitizedDrawnByTopic;

      state.practiceHistoryQuestionIds = state.practiceHistoryQuestionIds.filter((id) => validQuestionIds.has(id));

      if (!validTopicIds.has(state.currentTopicId)) {
        state.currentTopicId = null;
      }

      if (!validQuestionIds.has(state.currentQuestionId)) {
        state.currentQuestionId = null;
        state.isQuestionVisible = false;
        state.isAnswerVisible = false;
      }
    }

    function syncPartInUrl(removeAutoStart = false) {
      if (!window.history.replaceState) {
        return;
      }
      const params = new URLSearchParams(window.location.search);
      params.set("part", activePart);
      if (removeAutoStart) {
        params.delete("autostart");
      }
      const query = params.toString();
      window.history.replaceState({}, document.title, query ? `${window.location.pathname}?${query}` : window.location.pathname);
    }

    function switchPart(nextPart, options = {}) {
      const { fromInit = false } = options;
      if (!PARTS.includes(nextPart)) {
        return;
      }
      if (!fromInit && nextPart === activePart) {
        return;
      }

      if (!fromInit) {
        saveActivePartState();
      }

      stopAnyPlayback();
      activePart = nextPart;
      loadActivePartState();
      renderPartButtons();
      syncPartInUrl(true);
      closeDrawer();
      renderStage();
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function saveHistoryTogglePosition(left, top) {
      try {
        window.localStorage.setItem(HISTORY_TOGGLE_POS_KEY, JSON.stringify({ left, top }));
      } catch (error) {
        console.info("Failed to persist history toggle position:", error);
      }
    }

    function loadHistoryTogglePosition() {
      try {
        const raw = window.localStorage.getItem(HISTORY_TOGGLE_POS_KEY);
        if (!raw) {
          return null;
        }
        const parsed = JSON.parse(raw);
        if (!parsed || !Number.isFinite(parsed.left) || !Number.isFinite(parsed.top)) {
          return null;
        }
        return parsed;
      } catch (_error) {
        return null;
      }
    }

    function applyHistoryTogglePosition(left, top) {
      const gap = 8;
      const maxLeft = window.innerWidth - historyToggle.offsetWidth - gap;
      const maxTop = window.innerHeight - historyToggle.offsetHeight - gap;
      historyToggle.style.left = `${clamp(left, gap, Math.max(gap, maxLeft))}px`;
      historyToggle.style.top = `${clamp(top, gap, Math.max(gap, maxTop))}px`;
      historyToggle.style.right = "auto";
      historyToggle.style.bottom = "auto";
      historyToggle.style.transform = "none";
    }

    function ensureHistoryTogglePosition() {
      if (dragState.inited) {
        return;
      }
      const saved = loadHistoryTogglePosition();
      if (saved) {
        applyHistoryTogglePosition(saved.left, saved.top);
      } else {
        const rect = historyToggle.getBoundingClientRect();
        applyHistoryTogglePosition(rect.left, rect.top);
      }
      dragState.inited = true;
    }

    function endHistoryToggleDrag(pointerId) {
      if (dragState.pointerId !== pointerId) {
        return;
      }
      if (dragState.moved) {
        const rect = historyToggle.getBoundingClientRect();
        saveHistoryTogglePosition(rect.left, rect.top);
        dragState.justDragged = true;
        window.setTimeout(() => {
          dragState.justDragged = false;
        }, 0);
      }
      try {
        historyToggle.releasePointerCapture(pointerId);
      } catch (_error) {
        // ignore
      }
      dragState.pointerId = null;
      historyToggle.classList.remove("dragging");
    }

    function initHistoryToggleDrag() {
      ensureHistoryTogglePosition();

      historyToggle.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) {
          return;
        }
        ensureHistoryTogglePosition();
        const rect = historyToggle.getBoundingClientRect();
        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.startY = event.clientY;
        dragState.originLeft = rect.left;
        dragState.originTop = rect.top;
        dragState.moved = false;
        historyToggle.setPointerCapture(event.pointerId);
        historyToggle.classList.add("dragging");
        event.preventDefault();
      });

      historyToggle.addEventListener("pointermove", (event) => {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }
        const deltaX = event.clientX - dragState.startX;
        const deltaY = event.clientY - dragState.startY;
        if (!dragState.moved && (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3)) {
          dragState.moved = true;
        }
        applyHistoryTogglePosition(dragState.originLeft + deltaX, dragState.originTop + deltaY);
      });

      historyToggle.addEventListener("pointerup", (event) => {
        endHistoryToggleDrag(event.pointerId);
      });
      historyToggle.addEventListener("pointercancel", (event) => {
        endHistoryToggleDrag(event.pointerId);
      });

      window.addEventListener("resize", () => {
        ensureHistoryTogglePosition();
        const rect = historyToggle.getBoundingClientRect();
        applyHistoryTogglePosition(rect.left, rect.top);
      });
    }

    function getAllEnglishVoices() {
      if (!("speechSynthesis" in window)) {
        return [];
      }
      return window.speechSynthesis.getVoices().filter((voice) => /^en(-|_)/i.test(voice.lang));
    }

    function getVoiceScore(voice) {
      let score = 0;
      const name = voice.name || "";
      const lang = voice.lang || "";
      if (/^en-US$/i.test(lang)) {
        score += 45;
      } else if (/^en(-|_)/i.test(lang)) {
        score += 30;
      }
      if (voice.localService) {
        score += 16;
      }
      if (/(Natural|Neural|Premium|Enhanced)/i.test(name)) {
        score += 90;
      }
      if (/(Samantha|Google US English|Karen|Moira|Daniel|Serena|Alex|Aria|Jenny|Guy|Emma|Brian|Andrew|Ana)/i.test(name)) {
        score += 48;
      }
      if (/(Compact|eSpeak|Festival|Robot|Synth)/i.test(name)) {
        score -= 80;
      }
      return score;
    }

    function pickPreferredEnglishVoice() {
      const englishVoices = getAllEnglishVoices();
      if (!englishVoices.length) {
        return null;
      }
      const sorted = [...englishVoices].sort((a, b) => getVoiceScore(b) - getVoiceScore(a));
      return sorted[0] || englishVoices[0];
    }

    function splitIntoSpeechChunks(text) {
      const normalized = text.replace(/\s+/g, " ").trim();
      if (!normalized) {
        return [];
      }
      if (normalized.length <= 170) {
        return [normalized];
      }
      const sentences = normalized.match(/[^.!?;:]+[.!?;:]?/g) || [normalized];
      const chunks = [];
      let bucket = "";
      sentences.forEach((sentence) => {
        const part = sentence.trim();
        if (!part) {
          return;
        }
        if (!bucket) {
          bucket = part;
          return;
        }
        const candidate = `${bucket} ${part}`;
        if (candidate.length > 170) {
          chunks.push(bucket);
          bucket = part;
        } else {
          bucket = candidate;
        }
      });
      if (bucket) {
        chunks.push(bucket);
      }
      return chunks;
    }

    function stopCurrentAudio() {
      if (!currentAudio) {
        return;
      }
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }

    function stopAnyPlayback() {
      stopCurrentAudio();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function getAudioPath(questionId, role) {
      const key = String(questionId);
      const item = audioManifest[key];
      if (!item) {
        return "";
      }
      return item[role] || "";
    }

    async function playGeneratedAudio(questionId, role) {
      const audioPath = getAudioPath(questionId, role);
      if (!audioPath) {
        return false;
      }
      stopAnyPlayback();
      const audio = new Audio(audioPath);
      audio.preload = "auto";
      audio.playbackRate = currentRate;
      currentAudio = audio;
      try {
        await audio.play();
        audio.onended = () => {
          if (currentAudio === audio) {
            currentAudio = null;
          }
        };
        return true;
      } catch (error) {
        console.warn("Failed to play generated audio:", error);
        if (currentAudio === audio) {
          currentAudio = null;
        }
        return false;
      }
    }

    async function speakByRole(role, fallbackText) {
      if (currentQuestion) {
        const played = await playGeneratedAudio(currentQuestion.id, role);
        if (played) {
          return;
        }
      }
      speakText(fallbackText);
    }

    function speakText(text) {
      if (!text) {
        return;
      }
      if (!("speechSynthesis" in window)) {
        window.alert("当前浏览器不支持语音朗读。请使用 Chrome 或 Edge。\nSpeech synthesis is not supported in this browser.");
        return;
      }
      const preferredVoice = pickPreferredEnglishVoice();
      const chunks = splitIntoSpeechChunks(text);
      if (!chunks.length) {
        return;
      }
      stopAnyPlayback();
      chunks.forEach((chunk, index) => {
        const utterance = new SpeechSynthesisUtterance(chunk);
        utterance.lang = preferredVoice ? preferredVoice.lang : "en-US";
        const baseRate = currentRate * 0.94;
        utterance.rate = Math.max(0.72, Math.min(1.1, baseRate + (index % 2 === 0 ? 0.006 : -0.004)));
        utterance.pitch = 0.97;
        utterance.volume = 1;
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }
        window.speechSynthesis.speak(utterance);
      });
    }

    function updateRemaining() {
      const topicsTotal = getPartTopics().length;
      const remaining = Math.max(topicsTotal - drawnTopicIds.length, 0);
      remainingEl.textContent = `剩余未抽：${remaining}个话题`;
    }

    function updateActionButton() {
      btnAction.classList.remove("btn-view", "btn-answer");

      if (!currentQuestion) {
        btnAction.textContent = "👀 查看题目";
        btnAction.classList.add("btn-view");
        btnAction.disabled = true;
        return;
      }

      if (!isQuestionVisible) {
        btnAction.textContent = "👀 查看题目";
        btnAction.classList.add("btn-view");
        btnAction.disabled = false;
        return;
      }

      btnAction.textContent = "💡 用口语回答";
      btnAction.classList.add("btn-answer");
      btnAction.disabled = isAnswerVisible;
    }

    function getAnswerBundle(question) {
      if (!question) {
        return {
          simple_en: "",
          simple_cn: "",
          advanced_en: "",
          advanced_cn: ""
        };
      }

      const fromBank = answerBank[question.id] || {};
      return {
        simple_en: String(fromBank.simple_en || question.simple_en || "A short answer could be based on your real personal experience."),
        simple_cn: String(fromBank.simple_cn || question.simple_cn || "中文思路：用2-3句结合你的真实情况回答即可。"),
        advanced_en: String(fromBank.advanced_en || question.advanced_en || "A stronger answer should include reasons, examples, and personal impact."),
        advanced_cn: String(fromBank.advanced_cn || question.advanced_cn || "中文思路：补充原因、细节和影响，让表达更完整。")
      };
    }

    function updateTopicButtonsState() {
      const topics = getPartTopics();
      const hasTopics = topics.length > 0;
      const hasCurrentTopic = Boolean(currentTopicId && getTopicById(currentTopicId));

      btnDrawTopic.disabled = !hasTopics;
      btnDrawQuestion.disabled = !hasCurrentTopic;

      if (!hasTopics) {
        btnDrawTopic.textContent = "🎯 抽取新话题";
        btnDrawQuestion.textContent = "🧩 抽取该话题内的新问题";
        return;
      }

      if (hasCurrentTopic) {
        btnDrawTopic.textContent = "🎯 抽取新话题";
        btnDrawQuestion.textContent = "🧩 抽取该话题内的新问题";
      } else {
        btnDrawTopic.textContent = "🎯 抽取话题";
        btnDrawQuestion.textContent = "🧩 先抽取话题";
      }
    }

    function fillQuestionContent() {
      if (!currentQuestion) {
        questionEn.textContent = "";
        questionCn.textContent = "";
        simpleEn.textContent = "";
        simpleCn.textContent = "";
        advancedEn.textContent = "";
        advancedCn.textContent = "";
        return;
      }

      const topic = getTopicById(currentTopicId);
      const answer = getAnswerBundle(currentQuestion);
      questionPill.textContent = `${getPartLabel(activePart)} · ${topic ? topic.topic_title_en : "Topic"}`;
      questionEn.textContent = `Q${currentQuestion.order}. ${currentQuestion.question_en}`;
      questionCn.textContent = `💡 ${currentQuestion.question_cn}`;
      simpleEn.textContent = `A1: ${answer.simple_en}`;
      simpleCn.textContent = `中文翻译：${answer.simple_cn}`;
      advancedEn.textContent = `A2: ${answer.advanced_en}`;
      advancedCn.textContent = `中文翻译：${answer.advanced_cn}`;
    }

    function renderHistoryList() {
      historyList.innerHTML = "";
      const questions = getPartQuestions();

      if (!practiceHistoryQuestionIds.length) {
        const emptyNode = document.createElement("li");
        emptyNode.className = "history-empty";
        emptyNode.textContent = `${getPartLabel(activePart)} 暂无练习记录，先抽取话题开始吧。`;
        historyList.appendChild(emptyNode);
        return;
      }

      practiceHistoryQuestionIds.forEach((id) => {
        const item = questions.find((question) => question.id === id);
        if (!item) {
          return;
        }
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "history-item";
        button.dataset.qid = String(item.id);

        if (currentQuestion && currentQuestion.id === item.id) {
          button.classList.add("active");
        }

        const qid = document.createElement("span");
        qid.className = "history-qid";
        qid.textContent = `${item.topic_title_en} · Q${item.order}`;

        const topic = document.createElement("span");
        topic.className = "history-topic";
        topic.textContent = item.question_en;

        button.appendChild(qid);
        button.appendChild(topic);
        li.appendChild(button);
        historyList.appendChild(li);
      });
    }

    function renderStage() {
      const isCompactStage = !currentQuestion || (!isQuestionVisible && !isAnswerVisible);
      stageEl.classList.toggle("compact", isCompactStage);
      updateTopicButtonsState();

      if (!currentQuestion) {
        waitingBox.classList.remove("hidden");
        questionPill.classList.add("hidden");
        questionBox.classList.add("hidden");
        answersPanel.classList.add("hidden");
        btnReplay.disabled = true;
        updateActionButton();
        updateRemaining();
        renderHistoryList();
        return;
      }

      fillQuestionContent();
      btnReplay.disabled = false;
      waitingBox.classList.add("hidden");
      questionPill.classList.remove("hidden");

      if (isQuestionVisible) {
        questionBox.classList.remove("hidden");
      } else {
        questionBox.classList.add("hidden");
      }

      if (isQuestionVisible && isAnswerVisible) {
        answersPanel.classList.remove("hidden");
      } else {
        answersPanel.classList.add("hidden");
      }
      updateActionButton();
      updateRemaining();
      renderHistoryList();
    }

    function closeDrawer() {
      historyDrawer.classList.remove("open");
      historyDrawer.setAttribute("aria-hidden", "true");
      historyBackdrop.classList.add("hidden");
    }

    function openDrawer() {
      historyDrawer.classList.add("open");
      historyDrawer.setAttribute("aria-hidden", "false");
      historyBackdrop.classList.remove("hidden");
    }

    function markQuestionDrawn(topicId, questionId) {
      if (!drawnQuestionIdsByTopic[topicId]) {
        drawnQuestionIdsByTopic[topicId] = [];
      }
      if (!drawnQuestionIdsByTopic[topicId].includes(questionId)) {
        drawnQuestionIdsByTopic[topicId].push(questionId);
      }
    }

    function addToHistory(question) {
      if (!question) {
        return;
      }
      practiceHistoryQuestionIds = [
        question.id,
        ...practiceHistoryQuestionIds.filter((id) => id !== question.id)
      ];
    }

    function findQuestionById(questionId) {
      if (!Number.isFinite(questionId)) {
        return null;
      }
      return getPartQuestions().find((question) => question.id === questionId) || null;
    }

    function setCurrentQuestion(topic, question, options = {}) {
      const { autoSpeak = true, hideQuestion = true } = options;
      currentTopicId = topic.topic_id;
      currentQuestion = question;
      if (!drawnTopicIds.includes(topic.topic_id)) {
        drawnTopicIds.push(topic.topic_id);
      }
      markQuestionDrawn(topic.topic_id, question.id);
      addToHistory(question);
      isQuestionVisible = !hideQuestion;
      isAnswerVisible = false;
      renderStage();

      if (autoSpeak) {
        window.setTimeout(() => {
          speakByRole("topic", question.question_en);
        }, 120);
      }

      saveActivePartState();
    }

    function drawTopicAndFirstQuestion(options = {}) {
      const { autoSpeak = true } = options;
      const topics = getPartTopics();

      if (!topics.length) {
        window.alert(`${getPartLabel(activePart)} 暂无话题，请先补充该 Part 题库。`);
        return;
      }

      let availableTopics = topics.filter((topic) => !drawnTopicIds.includes(topic.topic_id));
      if (!availableTopics.length) {
        window.alert(`${getPartLabel(activePart)} 话题已全部抽取完，已自动重置话题池。`);
        drawnTopicIds = [];
        drawnQuestionIdsByTopic = {};
        availableTopics = topics;
      }

      const topic = availableTopics[Math.floor(Math.random() * availableTopics.length)];
      const firstQuestion = topic.questions[0];
      if (!firstQuestion) {
        return;
      }

      setCurrentQuestion(topic, firstQuestion, {
        autoSpeak,
        hideQuestion: true
      });
    }

    function drawQuestionInCurrentTopic(options = {}) {
      const { autoSpeak = true } = options;
      const topics = getPartTopics();

      if (!topics.length) {
        window.alert(`${getPartLabel(activePart)} 暂无话题，请先补充该 Part 题库。`);
        return;
      }

      if (!currentTopicId || !getTopicById(currentTopicId)) {
        window.alert("请先抽取一个话题，再抽取该话题内的新问题。");
        return;
      }

      const topic = getTopicById(currentTopicId);
      const drawnInTopic = drawnQuestionIdsByTopic[topic.topic_id] || [];
      const remainingQuestions = topic.questions.filter((question) => !drawnInTopic.includes(question.id));

      if (!remainingQuestions.length) {
        window.alert(`【${topic.topic_title_en}】该话题问题已抽取完，自动抽取下一个话题。`);
        drawTopicAndFirstQuestion({ autoSpeak });
        return;
      }

      const question = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
      setCurrentQuestion(topic, question, {
        autoSpeak,
        hideQuestion: true
      });
    }

    function jumpToHistoryQuestion(questionId) {
      const target = findQuestionById(questionId);
      if (!target) {
        return;
      }
      const topic = getTopicById(target.topic_id);
      if (!topic) {
        return;
      }
      currentTopicId = topic.topic_id;
      currentQuestion = target;
      if (!drawnTopicIds.includes(topic.topic_id)) {
        drawnTopicIds.push(topic.topic_id);
      }
      markQuestionDrawn(topic.topic_id, target.id);
      addToHistory(target);
      isQuestionVisible = true;
      isAnswerVisible = false;
      renderStage();
      saveActivePartState();
      closeDrawer();
    }

    function clearAutoStartFlagInUrl() {
      syncPartInUrl(true);
    }

    async function loadQuestionBank() {
      try {
        const response = await fetch(QUESTION_BANK_PATH, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        if (!Array.isArray(data) || !data.length) {
          throw new Error("Invalid question bank format");
        }

        questionBank = data.map((item, index) => ({
          id: Number(item.id),
          part: normalizePart(item.part),
          topic_id: String(item.topic_id || `topic-${index + 1}`),
          topic_title_en: String(item.topic_title_en || "Topic"),
          topic_title_cn: String(item.topic_title_cn || ""),
          topic_order: Number(item.topic_order || 999),
          order: Number(item.order || 999),
          question_en: String(item.question_en || ""),
          question_cn: String(item.question_cn || "")
        })).filter((item) => Number.isFinite(item.id) && item.question_en);

        PARTS.forEach((partKey) => sanitizePartState(partKey));
        loadActivePartState();
      } catch (error) {
        console.error("Failed to load question bank:", error);
        const isFileProtocol = window.location.protocol === "file:";
        const localHint =
          "当前你是直接打开 HTML 文件（file://），浏览器会拦截 JSON 读取。\n\n"
          + "请在项目目录运行：\n"
          + "python3 -m http.server 5500\n"
          + "然后访问：\n"
          + "http://localhost:5500\n\n"
          + "如果要分享给别人，建议部署到 Netlify，直接发网址即可。";

        const generalHint =
          "题库 JSON 加载失败，请检查：\n"
          + "1) question-bank.json 是否存在并为有效 JSON\n"
          + "2) 页面是否通过本地/线上服务器访问（不是 file://）\n"
          + "3) 部署后 question-bank.json 路径是否正确（同目录 ./question-bank.json）";

        window.alert(isFileProtocol ? localHint : generalHint);
      }

      renderStage();

      if (getPartTopics().length && shouldAutoStart && !currentQuestion) {
        drawTopicAndFirstQuestion({ autoSpeak: true });
        clearAutoStartFlagInUrl();
      }

      saveActivePartState();
    }

    async function loadAnswerBank() {
      try {
        const response = await fetch(ANSWER_BANK_PATH, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        let list = [];

        if (Array.isArray(data)) {
          list = data;
        } else if (data && typeof data === "object" && Array.isArray(data.items)) {
          list = data.items;
        } else if (data && typeof data === "object") {
          list = Object.entries(data).map(([id, item]) => ({
            id: Number(id),
            ...(item || {})
          }));
        }

        answerBank = list.reduce((acc, item) => {
          const id = Number(item.id);
          if (!Number.isFinite(id)) {
            return acc;
          }
          acc[id] = {
            simple_en: String(item.simple_en || ""),
            simple_cn: String(item.simple_cn || ""),
            advanced_en: String(item.advanced_en || ""),
            advanced_cn: String(item.advanced_cn || "")
          };
          return acc;
        }, {});
      } catch (error) {
        console.info("No answer bank detected; fallback to built-in placeholders.", error);
        answerBank = {};
      }
    }

    async function loadAudioManifest() {
      try {
        const response = await fetch(AUDIO_MANIFEST_PATH, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        if (data && typeof data === "object" && data.items && typeof data.items === "object") {
          audioManifest = data.items;
          return;
        }
        if (data && typeof data === "object") {
          audioManifest = data;
          return;
        }
        audioManifest = {};
      } catch (error) {
        console.info("No generated audio manifest detected; fallback to browser TTS.", error);
        audioManifest = {};
      }
    }

    btnReplay.addEventListener("click", () => {
      if (!currentQuestion) {
        return;
      }
      speakByRole("topic", currentQuestion.question_en);
    });

    btnAction.addEventListener("click", () => {
      if (!currentQuestion) {
        return;
      }

      if (!isQuestionVisible) {
        isQuestionVisible = true;
        renderStage();
        saveActivePartState();
        return;
      }

      if (!isAnswerVisible) {
        isAnswerVisible = true;
        renderStage();
        saveActivePartState();
      }
    });

    btnDrawTopic.addEventListener("click", () => {
      drawTopicAndFirstQuestion({ autoSpeak: true });
    });

    btnDrawQuestion.addEventListener("click", () => {
      drawQuestionInCurrentTopic({ autoSpeak: true });
    });

    speakSimple.addEventListener("click", () => {
      if (currentQuestion) {
        const answer = getAnswerBundle(currentQuestion);
        speakByRole("simple", answer.simple_en);
      }
    });

    speakAdvanced.addEventListener("click", () => {
      if (currentQuestion) {
        const answer = getAnswerBundle(currentQuestion);
        speakByRole("advanced", answer.advanced_en);
      }
    });

    speedButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentRate = Number(button.dataset.rate || "1");
        if (currentAudio) {
          currentAudio.playbackRate = currentRate;
        }
        speedButtons.forEach((btn) => {
          btn.classList.toggle("active", btn === button);
        });
      });
    });

    historyToggle.addEventListener("click", (event) => {
      if (dragState.justDragged) {
        event.preventDefault();
        return;
      }
      const isOpen = historyDrawer.classList.contains("open");
      if (isOpen) {
        closeDrawer();
      } else {
        openDrawer();
      }
    });

    historyClose.addEventListener("click", closeDrawer);
    historyBackdrop.addEventListener("click", closeDrawer);

    partButtons.forEach((button) => {
      button.addEventListener("click", () => {
        switchPart(normalizePart(button.dataset.part));
      });
    });

    historyList.addEventListener("click", (event) => {
      const target = event.target.closest("button[data-qid]");
      if (!target) {
        return;
      }
      const questionId = Number(target.dataset.qid);
      if (!Number.isFinite(questionId)) {
        return;
      }
      jumpToHistoryQuestion(questionId);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && historyDrawer.classList.contains("open")) {
        closeDrawer();
      }
    });

    renderPartButtons();
    syncPartInUrl(false);

    if ("speechSynthesis" in window) {
      window.speechSynthesis.getVoices();
    }

    renderStage();
    initHistoryToggleDrag();
    Promise.all([loadAudioManifest(), loadAnswerBank()]).then(() => {
      loadQuestionBank();
    });
  </script>
</body>
</html>
